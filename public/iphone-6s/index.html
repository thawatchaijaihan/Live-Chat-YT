<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="icon" href="https://minimax-algeng-chat-tts-us.oss-us-east-1.aliyuncs.com/ccv2%2F2026-04-13%2FMiniMax-M2.7%2F2026172050049077642%2F47c27f3dc3366afe8ffee3115ace1181f502cb810c6ac3c9ba29514bd2010416..png?Expires=1776168928&OSSAccessKeyId=LTAI5tCpJNKCf5EkQHSuL9xg&Signature=d7oy7rHSTBmDQbMuB6ZVk3VwpnE%3D">
  <title>Live Chat YouTube</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Day/Night Theme Variables */
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #252540;
      --border-color: #333;
      --text-primary: #e5e5e5;
      --text-secondary: #888;
      --accent: #3b82f6;
    }

    body.light {
      --bg-primary: #f5f5f5;
      --bg-secondary: #ffffff;
      --border-color: #ddd;
      --text-primary: #1a1a1a;
      --text-secondary: #666;
      --accent: #3b82f6;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 12px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .header-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      font-size: 16px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 4px;
    }

    .header-btn:active {
      opacity: 0.8;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      font-size: 11px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.live { background: #22c55e; }
    .status-dot.connecting { background: #eab308; animation: pulse 1s infinite; }
    .status-dot.offline { background: #666; }

    .status-bar .count {
      margin-left: auto;
      color: var(--text-secondary);
    }

    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: var(--bg-primary);
    }

    .content-padded {
      padding: 12px;
    }

    /* Messages */
    .message {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .message:active {
      background: var(--bg-secondary);
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .message-author {
      font-size: 13px;
      font-weight: 600;
      color: #4a9eff;
    }

    .message-badge {
      display: inline-block;
      padding: 1px 5px;
      font-size: 9px;
      font-weight: 600;
      border-radius: 3px;
      background: #166534;
      color: #86efac;
    }

    .message-badge.creator {
      background: #dc2626;
      color: #fca5a5;
    }

    .message-badge.member {
      background: #7c3aed;
      color: #ddd6fe;
    }

    .message-badge.superchat {
      background: #ca8a04;
      color: #fef08a;
    }

    .message-time {
      font-size: 10px;
      color: var(--text-secondary);
      margin-left: auto;
    }

    .message-text {
      font-size: 14px;
      line-height: 1.4;
      color: var(--text-primary);
      word-wrap: break-word;
    }

    /* Room Selector */
    .room-selector {
      width: 100%;
      height: 36px;
      padding: 0 8px;
      font-size: 14px;
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      margin-bottom: 8px;
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 40px;
      padding: 0 12px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:active {
      opacity: 0.8;
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:active {
      opacity: 0.8;
    }

    .btn-danger {
      background: #dc2626;
      color: #fff;
    }

    .btn-danger:active {
      background: #b91c1c;
    }

    .btn-small {
      height: 32px;
      font-size: 12px;
      width: auto;
      padding: 0 12px;
    }

    /* Cards */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    /* Form */
    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .form-input {
      width: 100%;
      height: 36px;
      padding: 0 8px;
      font-size: 14px;
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Search */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .search-input {
      flex: 1;
      height: 32px;
      padding: 0 10px;
      font-size: 14px;
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
    }

    /* Room List */
    .room-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .room-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
    }

    .room-item:active {
      opacity: 0.8;
    }

    .room-item.active {
      border-color: var(--accent);
    }

    .room-delete-btn {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      opacity: 0.6;
    }

    .room-delete-btn:active {
      opacity: 1;
    }

    .room-info {
      flex: 1;
      min-width: 0;
    }

    .room-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .room-url {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .room-stats {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: right;
    }

    /* Stats Grid */
    .stats-grid {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat-card {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* Summary */
    .summary-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-primary);
      white-space: pre-wrap;
    }

    /* AI Chat */
    .ai-chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .ai-header {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .ai-header .room-selector {
      flex: 1;
      margin-bottom: 0;
    }

    .ai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ai-empty {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px 20px;
    }

    .ai-message {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
    }

    .ai-message.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
    }

    .ai-message.assistant {
      align-self: flex-start;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .ai-message-role {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .ai-message-content {
      white-space: pre-wrap;
    }

    .ai-input-container {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
    }

    .ai-input-container .form-input {
      flex: 1;
      margin-bottom: 0;
    }

    .ai-input-container .btn {
      width: auto;
      padding: 0 16px;
    }

    /* Empty */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Bottom Nav */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-around;
      height: 56px;
      background: var(--bg-primary);
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      height: 100%;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .nav-item:active {
      background: var(--bg-secondary);
    }

    .nav-item.active {
      color: var(--accent);
    }

    .nav-icon {
      font-size: 20px;
      margin-bottom: 2px;
    }

    /* Room Tabs */
    .room-tab {
      flex-shrink: 0;
      height: 24px;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 600;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
      border-radius: 0;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .room-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .room-tab:active {
      opacity: 0.8;
    }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 2px 6px;
      font-size: 10px;
      font-weight: 600;
      border-radius: 4px;
    }

    .badge-green {
      background: #166534;
      color: #86efac;
    }

    .badge-yellow {
      background: #854d0e;
      color: #fde047;
    }

    .badge-red {
      background: #991b1b;
      color: #fca5a5;
    }

    .badge-offline {
      background: #666;
      color: #fff;
    }

    /* Section Title */
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .section-subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
    }

    /* Inline flex helpers */
    .flex { display: flex; }
    .flex-1 { flex: 1; }
    .items-center { align-items: center; }
    .gap-2 { gap: 8px; }
    .gap-1 { gap: 4px; }
    .ml-auto { margin-left: auto; }
    .mt-2 { margin-top: 8px; }
    .mb-2 { margin-bottom: 8px; }
    .text-sm { font-size: 12px; }
    .text-xs { font-size: 10px; }
    .text-muted { color: #888; }
    .truncate {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:center;">
      <img src="https://minimax-algeng-chat-tts-us.oss-us-east-1.aliyuncs.com/ccv2%2F2026-04-13%2FMiniMax-M2.7%2F2026172050049077642%2F47c27f3dc3366afe8ffee3115ace1181f502cb810c6ac3c9ba29514bd2010416..png?Expires=1776168928&OSSAccessKeyId=LTAI5tCpJNKCf5EkQHSuL9xg&Signature=d7oy7rHSTBmDQbMuB6ZVk3VwpnE%3D" alt="logo" style="height:28px;width:28px;border-radius:4px;margin-right:8px;">
      <span class="header-title">Live Chat YouTube</span>
    </div>
    <button class="header-btn" id="theme-btn">🌙</button>
  </div>

  <!-- Room Tabs -->
  <div id="room-tabs" style="display:flex;overflow-x:auto;gap:6px;padding:8px 12px;background:var(--bg-primary);border-bottom:1px solid var(--border-color);-webkit-overflow-scrolling:touch;"></div>

  <!-- Status Bar -->
  <div class="status-bar" id="status-bar" style="display:none;">
    <span class="status-dot offline" id="status-dot"></span>
    <span id="status-text">ไม่ได้เชื่อมต่อ</span>
    <span class="count" id="msg-count">0 ข้อความ</span>
  </div>

  <!-- Content Area -->
  <div id="content" class="content"></div>

  <!-- Bottom Navigation -->
  <nav class="nav">
    <button class="nav-item" data-view="rooms">
      <span class="nav-icon">📺</span>
      <span>แดชบอร์ด</span>
    </button>
    <button class="nav-item active" data-view="chat">
      <span class="nav-icon">💬</span>
      <span>ห้องแชท</span>
    </button>
    <button class="nav-item" data-view="filter">
      <span class="nav-icon">🔍</span>
      <span>ตัวกรอง</span>
    </button>
    <button class="nav-item" data-view="ai">
      <span class="nav-icon">✨</span>
      <span>วิเคราะห์</span>
    </button>
    <button class="nav-item" data-view="settings">
      <span class="nav-icon">⚙️</span>
      <span>ตั้งค่า</span>
    </button>
  </nav>

  <script>
    // API Base URL
    var API_BASE = 'https://humourlessly-combative-pura.ngrok-free.dev';

    // State
    var state = {
      currentView: 'chat',
      rooms: [],
      activeRoomId: null,
      activeRoom: null,
      messages: [],
      telegramChatId: '',
      isConnected: false,
      isConnecting: false,
      hasMoreMessages: true,
      isLoadingMore: false,
      oldestTimestamp: null,
      lastMessageTime: null,
      isLive: true,
      isLight: false,
      sse: null,
      chatMessages: [],
      chatRoomId: null
    };

    // DOM
    var contentEl = document.getElementById('content');
    var roomTabsEl = document.getElementById('room-tabs');
    var statusDot = document.getElementById('status-dot');
    var statusText = document.getElementById('status-text');
    var msgCount = document.getElementById('msg-count');
    var themeBtn = document.getElementById('theme-btn');
    var navItems = document.querySelectorAll('.nav-item');

    // Init
    function init() {
      // Load theme preference
      var savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        state.isLight = true;
        document.body.classList.add('light');
        themeBtn.textContent = '☀️';
      }
      loadRooms();
      setupNavigation();
      setupThemeBtn();
    }

    // Setup Navigation
    function setupNavigation() {
      navItems.forEach(function(item) {
        item.addEventListener('click', function(e) {
          var view = e.currentTarget.getAttribute('data-view');
          if (view) {
            setView(view);
          }
        });
      });
    }

    // Setup Theme Button
    function setupThemeBtn() {
      themeBtn.addEventListener('click', function() {
        state.isLight = !state.isLight;
        if (state.isLight) {
          document.body.classList.add('light');
          themeBtn.textContent = '☀️';
          localStorage.setItem('theme', 'light');
        } else {
          document.body.classList.remove('light');
          themeBtn.textContent = '🌙';
          localStorage.setItem('theme', 'dark');
        }
        // Re-render room tabs to update background color
        renderRoomTabs();
      });
    }

    // Connect to room (kept for reference, not used since polling is always on)
    function connect() {
      if (!state.activeRoomId) return;
      state.isConnecting = true;
      updateStatus();
      state.isConnecting = false;
      state.isConnected = true;
      updateStatus();
      loadMessages();
    }

    // Disconnect (kept for reference)
    function disconnect() {
      state.isConnected = false;
      state.isConnecting = false;
      updateStatus();
    }

    // Update Status Bar
    function updateStatus() {
      // Check if room is marked as ended from API
      var currentRoom = state.rooms.find(function(r) { return r.id === state.activeRoomId; });
      var isEnded = currentRoom ? currentRoom.isEnded : false;
      var totalMessages = currentRoom ? currentRoom.messageCount : 0;

      if (state.activeRoomId && !isEnded) {
        statusDot.className = 'status-dot live';
        statusText.textContent = 'ถ่ายทอดสด';
      } else if (state.activeRoomId && isEnded) {
        statusDot.className = 'status-dot offline';
        statusText.textContent = 'จบการถ่ายทอด';
      } else {
        statusDot.className = 'status-dot offline';
        statusText.textContent = 'ไม่ได้เชื่อมต่อ';
      }
      msgCount.textContent = totalMessages + ' ข้อความ';
    }

    // Load Rooms
    function loadRooms() {
      console.log('loadRooms called, API:', API_BASE + '/api/rooms');
      fetch(API_BASE + '/api/rooms')
        .then(function(res) {
          console.log('Response status:', res.status);
          return res.json();
        })
        .then(function(rooms) {
          console.log('Rooms loaded:', rooms.length, rooms);
          state.rooms = rooms;
          if (rooms.length > 0 && !state.activeRoomId) {
            state.activeRoomId = rooms[0].id;
            state.activeRoom = rooms[0];
            state.telegramChatId = rooms[0].telegramChatId || '';
          }
          // Update live status from room data
          if (state.activeRoom) {
            var currentRoom = rooms.find(function(r) { return r.id === state.activeRoomId; });
            if (currentRoom) {
              state.activeRoom.isEnded = currentRoom.isEnded;
            }
          }
          renderRoomTabs();
          // Load messages for active room
          if (state.activeRoomId) {
            loadMessages();
            startSSE();
          }
          renderView();
        })
        .catch(function(err) {
          console.error('Failed to load rooms:', err);
        });
    }

    // Start SSE Connection
    function startSSE() {
      // Close existing SSE
      if (state.sse) {
        state.sse.close();
        state.sse = null;
      }

      if (!state.activeRoomId) return;

      var sseUrl = API_BASE + '/api/chat?roomId=' + state.activeRoomId;
      console.log('Connecting to SSE:', sseUrl);

      state.sse = new EventSource(sseUrl);

      state.sse.onopen = function() {
        console.log('SSE connected');
        state.isConnected = true;
        updateStatus();
      };

      state.sse.onerror = function(err) {
        console.error('SSE error:', err);
        state.isConnected = false;
        updateStatus();
      };

      state.sse.addEventListener('start', function(e) {
        console.log('SSE start:', e.data);
        state.isLive = true;
        updateStatus();
      });

      state.sse.addEventListener('chat', function(e) {
        var message = JSON.parse(e.data);
        console.log('SSE chat message:', message);
        // Add message to the beginning (newest at top)
        state.messages.push(message);
        state.messages.sort(function(a, b) {
          return new Date(a.timestamp) - new Date(b.timestamp);
        });
        if (state.currentView === 'chat') {
          renderChat();
        }
        updateStatus();
      });

      state.sse.addEventListener('end', function(e) {
        console.log('SSE end:', e.data);
        state.isLive = false;
        updateStatus();
      });

      state.sse.addEventListener('chat-error', function(e) {
        console.error('SSE chat error:', e.data);
      });

    // Load Messages
    function loadMessages(append, direction) {
      if (!state.activeRoomId) {
        console.log('loadMessages: no activeRoomId');
        return;
      }

      var url = API_BASE + '/api/rooms/' + state.activeRoomId + '/messages?limit=300';
      if (direction === 'older' && state.oldestTimestamp) {
        url += '&before=' + encodeURIComponent(state.oldestTimestamp);
      }

      fetch(url)
        .then(function(res) { return res.json(); })
        .then(function(messages) {
          console.log('loadMessages: got', messages.length, 'messages, direction:', direction);
          // API returns newest first, reverse for oldest first
          if (direction === 'older') {
            // Load older messages - add to beginning
            var olderMessages = messages.reverse();
            if (olderMessages.length > 0) {
              state.oldestTimestamp = olderMessages[0].timestamp;
            }
            state.messages = olderMessages.concat(state.messages);
            state.hasMoreMessages = messages.length === 300;
            state.isLoadingMore = false;
          } else if (!append) {
            // Initial load or refresh
            state.messages = messages.reverse();
            if (state.messages.length > 0) {
              state.oldestTimestamp = state.messages[0].timestamp;
              state.lastMessageTime = new Date(state.messages[state.messages.length - 1].timestamp);
            }
            state.hasMoreMessages = messages.length === 300;
            state.isLive = true;
            console.log('Set state.messages to', state.messages.length, 'messages');
          } else {
            // Append new messages at end
            var existingIds = {};
            state.messages.forEach(function(m) { existingIds[m.id] = true; });
            messages.reverse().forEach(function(m) {
              if (!existingIds[m.id]) {
                state.messages.push(m);
                state.lastMessageTime = new Date(m.timestamp);
              }
            });
            state.messages.sort(function(a, b) {
              return new Date(a.timestamp) - new Date(b.timestamp);
            });
            if (messages.length > 0) {
              state.isLive = true;
            }
          }
          if (state.currentView === 'chat') {
            renderChat();
          }
          updateStatus();
        })
        .catch(function(err) {
          console.error('Failed to load messages:', err);
          state.isLoadingMore = false;
        });
    }

    // Fetch YouTube Title
    function fetchYouTubeTitle(input, callback) {
      var videoId = extractVideoId(input);

      if (videoId) {
        // Video URL - use oembed directly
        var oembedUrl = 'https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=' + videoId + '&format=json';
        fetch(oembedUrl)
          .then(function(res) { if (!res.ok) throw new Error('oembed failed'); return res.json(); })
          .then(function(data) { callback(data.title || null); })
          .catch(function() { callback(null); });
      } else if (input.startsWith('@')) {
        // @username format - try to get channel page and parse
        var channelName = input.substring(1);
        // Use noembed or just skip for @username
        // YouTube oembed doesn't support @username, so use a workaround
        var proxyUrl = 'https://noembed.com/embed?url=https://www.youtube.com/@' + channelName;
        fetch(proxyUrl)
          .then(function(res) { if (!res.ok) throw new Error('noembed failed'); return res.json(); })
          .then(function(data) {
            callback(data.title || null);
          })
          .catch(function() {
            callback(null);
          });
      } else {
        callback(null);
      }
    }

    function extractVideoId(url) {
      var match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      return match ? match[1] : null;
    }

    function deleteRoom(roomId) {
      fetch(API_BASE + '/api/rooms/' + roomId, {
        method: 'DELETE'
      })
        .then(function(res) { return res.json(); })
        .then(function() {
          // If deleted room was active, clear it
          if (state.activeRoomId === roomId) {
            state.activeRoomId = null;
            state.activeRoom = null;
            state.messages = [];
          }
          // Clear chat data for this room
          clearChatInStorage(roomId);
          // If deleted room was chat room, clear it
          if (state.chatRoomId === roomId) {
            state.chatRoomId = null;
            state.chatMessages = [];
          }
          loadRooms();
        })
        .catch(function(err) {
          console.error('Failed to delete room:', err);
        });
    }

    function addRoom() {
      var name = document.getElementById('room-name').value.trim();
      var input = document.getElementById('room-input').value.trim();
      if (!name || !input) return;

      fetch(API_BASE + '/api/rooms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, input: input })
      })
        .then(function(res) { return res.json(); })
        .then(function(newRoom) {
          // Reload all rooms to get updated list
          fetch(API_BASE + '/api/rooms')
            .then(function(r) { return r.json(); })
            .then(function(rooms) {
              state.rooms = rooms;
              var found = rooms.find(function(r) { return r.id === newRoom.id; });
              if (found) {
                state.activeRoomId = found.id;
                state.activeRoom = found;
                state.telegramChatId = found.telegramChatId || '';
              }
              state.messages = [];
              state.hasMoreMessages = true;
              state.oldestTimestamp = null;
              renderRoomTabs();
              loadMessages();
              startSSE();
              setView('chat');
            });
        })
        .catch(function(err) {
          console.error('Failed to add room:', err);
        });
    }

    // Perform Search
    function performSearch() {
      var query = document.getElementById('filter-query').value.trim();
      if (!query) return;

      var resultsEl = document.getElementById('search-results');
      resultsEl.innerHTML = '<div class="loading"><span class="loading-spinner"></span>กำลังค้นหา...</div>';

      var promises = state.rooms.map(function(room) {
        return fetch(API_BASE + '/api/rooms/' + room.id + '/messages/search?q=' + encodeURIComponent(query))
          .then(function(res) { return res.json(); })
          .then(function(messages) {
            return { room: room, messages: messages };
          })
          .catch(function() { return { room: room, messages: [] }; });
      });

      Promise.all(promises).then(function(results) {
        var html = '';
        results.forEach(function(result) {
          if (result.messages.length > 0) {
            html += '<div class="card"><div class="card-title">' + escapeHtml(result.room.name) + ' (' + result.messages.length + ' ข้อความ)</div>';
            result.messages.forEach(function(msg) {
              html += renderMessage(msg);
            });
            html += '</div>';
          }
        });

        if (!html) {
          html = '<div class="empty"><div class="empty-icon">🔍</div><p>ไม่พบผลลัพธ์</p></div>';
        }
        resultsEl.innerHTML = html;
      });
    }

    // Perform Summarize
    function performSummarize() {
      var roomId = document.getElementById('ai-room-select').value;
      if (!roomId) return;

      var resultEl = document.getElementById('ai-result');
      resultEl.innerHTML = '<div class="card"><div class="loading"><span class="loading-spinner"></span>AI กำลังวิเคราะห์...</div></div>';

      fetch(API_BASE + '/api/ai/summarize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ roomId: roomId, messageCount: 50 })
      })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          resultEl.innerHTML = '<div class="card"><div class="summary-text">' + escapeHtml(data.summary || 'ไม่สามารถสร้างสรุปได้') + '</div></div>';
        })
        .catch(function(err) {
          resultEl.innerHTML = '<div class="card"><p class="text-sm" style="color:#f87171">เกิดข้อผิดพลาด</p></div>';
        });
    }

    // Helpers
    function formatTime(timestamp) {
      if (!timestamp) return '';
      var d = new Date(timestamp);
      return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    }

    // LocalStorage helpers for chat
    function getChatStorageKey(roomId) {
      return 'chat_' + roomId;
    }

    function loadChatFromStorage() {
      if (!state.chatRoomId) return;
      var key = getChatStorageKey(state.chatRoomId);
      var stored = localStorage.getItem(key);
      if (stored) {
        try {
          state.chatMessages = JSON.parse(stored);
        } catch(e) {
          state.chatMessages = [];
        }
      } else {
        state.chatMessages = [];
      }
    }

    function saveChatToStorage() {
      if (!state.chatRoomId) return;
      var key = getChatStorageKey(state.chatRoomId);
      localStorage.setItem(key, JSON.stringify(state.chatMessages));
    }

    function clearChatInStorage(roomId) {
      var key = getChatStorageKey(roomId || state.chatRoomId);
      localStorage.removeItem(key);
    }

    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Start
    init();
  </script>
</body>
</html>
